<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PBA Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/6f4b5d8f6d.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="sidebar">

<h2>PBA</h2>

<a href="#"><i class="fas fa-home"></i> Dashboard</a>

<a href="#"><i class="fas fa-wallet"></i> Balance</a>

<a href="#"><i class="fas fa-money-bill-wave"></i> Cash In</a>

<a href="#"><i class="fas fa-paper-plane"></i> Send Money</a>

<a href="#"><i class="fas fa-history"></i> Transactions</a>

<a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>

</div>

<div class="content">

<h1>Welcome, Demo User 👋</h1>

<div class="balance-card">

<h3>Available Balance</h3>

<h2 id="balance">₱50,000.00</h2>

</div>

<div class="buttons">

<button onclick="cashIn()">Cash In</button>

<button onclick="sendMoney()">Send Money</button>

</div>

<h2>Recent Transactions</h2>

<table>

<tr>

<th>Date</th>

<th>Description</th>

<th>Amount</th>

</tr>

<tbody id="history">

<tr>

<td>Jun 28</td>

<td>Salary Deposit</td>

<td style="color:lime;">+₱20,000</td>

</tr>

<tr>

<td>Jun 27</td>

<td>Grocery Store</td>

<td style="color:red;">-₱1,250</td>

</tr>

<tr>

<td>Jun 26</td>

<td>Internet Bill</td>

<td style="color:red;">-₱1,499</td>

</tr>

</tbody>

</table>

</div>

<script src="dashboard.js"></script>

</body>
</html>
