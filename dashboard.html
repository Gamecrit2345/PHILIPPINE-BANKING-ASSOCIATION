<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | PBA</title>

  <link rel="stylesheet" href="css/dashboard.css">

  <!-- GLOBAL STYLE -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="topbar">
  <h2>PHILIPPINE BANKING ASSOCIATION</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="welcome">
    <h3 id="name">Welcome</h3>
    <p id="acc">Account</p>
  </div>

  <div class="balance-card">
    <h4>Available Balance</h4>
    <h1 id="balance">₱0.00</h1>
  </div>

  <div class="card">
    <div class="chip"></div>
    <p class="bank">PHILIPPINE BANKING ASSOCIATION</p>
    <p class="number">**** **** **** 4567</p>
    <p class="holder" id="holder">CARD HOLDER</p>
  </div>

  <div class="actions">
    <button onclick="cashIn()">💵 Cash In</button>
    <button onclick="withdraw()">💸 Withdraw</button>
    <button onclick="transfer()">🔄 Transfer</button>
  </div>

  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <div class="transactions">
    <h3>Recent Transactions</h3>
    <ul id="txList"></ul>
  </div>

</div>

<script src="js/dashboard.js"></script>

<!-- GLOBAL SCRIPTS -->
<script src="js/notify.js"></script>
<script src="js/loader.js"></script>

</body>
</html>
