<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PHILIPPINE BANKING ASSOCIATION</title>

  <link rel="stylesheet" href="css/login.css">

  <!-- GLOBAL STYLE -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="bg"></div>

<div class="login-box">
  <h1>PHILIPPINE BANKING ASSOCIATION</h1>
  <p class="sub">Secure Banking Portal (Demo)</p>

  <input type="text" id="account" placeholder="Account Number">

  <div class="pass-box">
    <input type="password" id="password" placeholder="Password">
    <button onclick="togglePass()">👁</button>
  </div>

  <button class="login-btn" onclick="login()">LOGIN</button>

  <p id="msg"></p>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p>Connecting to Bank Server...</p>
</div>

<!-- SCRIPTS -->
<script src="js/login.js"></script>
<script src="js/notify.js"></script>
<script src="js/loader.js"></script>

</body>
</html>
